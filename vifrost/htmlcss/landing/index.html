<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViFrost</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">

    <nav class="navbar">
      <div class="navbar__logo">
        <div class="navbar__logo-icon">
          <img src="../public/Icon.svg" alt="ViFrost" />
        </div>
        <span class="navbar__title">ViFrost</span>
      </div>

      <div class="navbar__right">
        <button class="navbar__stats-btn" title="Stats">
          <img src="../public/LeaderboardIcon.svg" alt="Leaderboard" />
        </button>
        <div class="navbar__login">
          <button type="button" class="navbar__log-in-btn">
            <img src="../public/AvatarIcon.svg" alt="Avatar" />
          </button>
        </div>
      </div>
    </nav>

    <main class="landing">
      <div class="landing__buttons">
        <button class="game-selection-btn">Casual</button>
        <button class="game-selection-btn">Ranked</button>
      </div>
    </main>

  </div>
</body>
</html>
